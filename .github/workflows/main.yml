name: Repository Check

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: ls

      - name: Confirm index.html exists
        run: test -f index.html
